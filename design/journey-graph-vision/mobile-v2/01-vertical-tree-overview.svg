<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="1040" viewBox="0 0 1360 1040">
<rect width="1360" height="1040" fill="#f7f3ea"/>
<style>text{font-family:Arial,Helvetica,sans-serif}</style>
<g transform="translate(-30 -15)">
<text x="50" y="60" fill="#15261f" font-size="25" font-weight="600" opacity="1"><tspan x="50" dy="0">01 · ROTATE THE TREE, NOT THE PHONE</tspan></text>
<text x="50" y="86" fill="#66736d" font-size="13" font-weight="500" opacity="1"><tspan x="50" dy="0">The same directed tree runs top-to-bottom. Journey depth becomes natural vertical scrolling instead of horizontal drift.</tspan></text>
<rect x="50" y="113" width="1320" height="900" rx="6" fill="#fffdf8" stroke="#15261f" stroke-width="3" opacity="1" />
<rect x="105" y="145" width="430" height="820" rx="6" fill="#fffdf8" stroke="#15261f" stroke-width="3" opacity="1" />
