<text x="290" y="352" fill="#66736d" font-size="8" font-weight="500" opacity="1"><tspan x="290" dy="0">TURN</tspan></text>
<text x="255" y="385" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="255" dy="0">Cities and memory</tspan></text>
<polyline points="320,405 320,429 200,429 200,459" fill="none" stroke="#bfc8c2" stroke-width="2" opacity="1" />
<polyline points="320,429 435,429 435,459" fill="none" stroke="#15261f" stroke-width="4" opacity="1" />
<rect x="141" y="467" width="142" height="70" rx="6" fill="#edf2ee" stroke="#bfc8c2" stroke-width="1" opacity="1" />
