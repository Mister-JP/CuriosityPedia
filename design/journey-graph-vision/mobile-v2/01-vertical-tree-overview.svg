<text x="125" y="174" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="125" dy="0">CURIOSITYPEDIA</tspan></text>
<text x="483" y="171" fill="#15261f" font-size="10" font-weight="500" opacity="1"><tspan x="483" dy="0">•••</tspan></text>
