<text x="122" y="294" fill="#66736d" font-size="9" font-weight="500" opacity="1"><tspan x="122" dy="0">‹ LIBRARY</tspan></text>
<rect x="245" y="279" width="90" height="27" rx="6" fill="#edf2ee" stroke="#15261f" stroke-width="1" opacity="1" />
<text x="254" y="295" fill="#15261f" font-size="9" font-weight="500" opacity="1"><tspan x="254" dy="0">FIT WIDTH</tspan></text>
<text x="448" y="294" fill="#66736d" font-size="9" font-weight="500" opacity="1"><tspan x="448" dy="0">SEARCH</tspan></text>
<rect x="245" y="333" width="150" height="72" rx="6" fill="#fffdf8" stroke="#15261f" stroke-width="1" opacity="1" />
