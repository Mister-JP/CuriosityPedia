<text x="143" y="479" fill="#15261f" font-size="9" font-weight="500" opacity="1"><tspan x="143" dy="0">FORGOTTEN PLACES</tspan></text>
<text x="143" y="505" fill="#66736d" font-size="9" font-weight="500" opacity="1"><tspan x="143" dy="0">6 turns · 4 open</tspan></text>
<text x="253" y="501" fill="#15261f" font-size="15" font-weight="500" opacity="1"><tspan x="253" dy="0">+</tspan></text>
<rect x="360" y="459" width="150" height="72" rx="6" fill="#fffdf8" stroke="#15261f" stroke-width="1" opacity="1" />
<ellipse cx="383" cy="482" rx="13" ry="13" fill="#edf2ee" stroke="#15261f" stroke-width="1" opacity="1"/>
