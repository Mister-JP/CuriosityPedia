<text x="405" y="478" fill="#66736d" font-size="8" font-weight="500" opacity="1"><tspan x="405" dy="0">TURN</tspan></text>
<text x="370" y="511" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="370" dy="0">Official memory</tspan></text>
<polyline points="435,531 435,555 320,555 320,585" fill="none" stroke="#bfc8c2" stroke-width="2" opacity="1" />
<polyline points="435,555 460,555 460,585" fill="none" stroke="#15261f" stroke-width="4" opacity="1" stroke-dasharray="8 6"/>
<rect x="255" y="593" width="145" height="70" rx="6" fill="#edf2ee" stroke="#bfc8c2" stroke-width="1" opacity="1" />
<rect x="251" y="589" width="145" height="70" rx="6" fill="#edf2ee" stroke="#bfc8c2" stroke-width="1" opacity="1" />
<rect x="247" y="585" width="145" height="70" rx="6" fill="#fffdf8" stroke="#15261f" stroke-width="2" opacity="1" />
<text x="257" y="605" fill="#15261f" font-size="9" font-weight="500" opacity="1"><tspan x="257" dy="0">ARCHIVES</tspan></text>
<text x="257" y="631" fill="#66736d" font-size="9" font-weight="500" opacity="1"><tspan x="257" dy="0">8 turns · 3 open</tspan></text>
<text x="370" y="627" fill="#15261f" font-size="15" font-weight="500" opacity="1"><tspan x="370" dy="0">+</tspan></text>
<rect x="397" y="585" width="125" height="72" rx="6" fill="#a9d4ff" stroke="#15261f" stroke-width="3" opacity="1" />
<ellipse cx="420" cy="608" rx="13" ry="13" fill="#dfff58" stroke="#15261f" stroke-width="1" opacity="1"/>
<text x="417" y="611" fill="#15261f" font-size="9" font-weight="500" opacity="1"><tspan x="417" dy="0">8</tspan></text>
<text x="442" y="604" fill="#66736d" font-size="8" font-weight="500" opacity="1"><tspan x="442" dy="0">TURN</tspan></text>
<text x="407" y="637" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="407" dy="0">Monuments disagree</tspan></text>
<polyline points="460,657 460,707" fill="none" stroke="#15261f" stroke-width="4" opacity="1" />
<rect x="385" y="707" width="150" height="72" rx="6" fill="#edffc1" stroke="#526800" stroke-width="1" opacity="1" stroke-dasharray="8 6"/>
<ellipse cx="408" cy="730" rx="13" ry="13" fill="#edf2ee" stroke="#526800" stroke-width="1" opacity="1"/>
<text x="405" y="733" fill="#15261f" font-size="9" font-weight="500" opacity="1"><tspan x="405" dy="0">9</tspan></text>
<text x="430" y="726" fill="#526800" font-size="8" font-weight="500" opacity="1"><tspan x="430" dy="0">OPEN PATH</tspan></text>
<text x="395" y="759" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="395" dy="0">Who renames a place?</tspan></text>
<rect x="123" y="861" width="146" height="32" rx="6" fill="#15261f" stroke="#15261f" stroke-width="1" opacity="1" />
<text x="135" y="879" fill="#fffdf8" font-size="9" font-weight="500" opacity="1"><tspan x="135" dy="0">↓ DEPTH 5–12 BELOW</tspan></text>
<rect x="105" y="915" width="430" height="50" rx="6" fill="#fffdf8" stroke="#bfc8c2" stroke-width="1" opacity="1" />
<text x="140" y="942" fill="#15261f" font-size="9" font-weight="500" opacity="1"><tspan x="140" dy="0">OVERVIEW</tspan></text>
<text x="275" y="942" fill="#15261f" font-size="9" font-weight="500" opacity="1"><tspan x="275" dy="0">YOU ARE HERE</tspan></text>
<text x="435" y="942" fill="#15261f" font-size="9" font-weight="500" opacity="1"><tspan x="435" dy="0">OPEN 7</tspan></text>
<rect x="585" y="205" width="600" height="420" rx="6" fill="#edf2ee" stroke="#bfc8c2" stroke-width="2" opacity="1" />
<text x="613" y="253" fill="#15261f" font-size="20" font-weight="600" opacity="1"><tspan x="613" dy="0">Why it scales better</tspan></text>
<text x="613" y="288" fill="#66736d" font-size="13" font-weight="500" opacity="1"><tspan x="613" dy="0">Depth grows downward—the direction phones already scroll. Breadth is compressed deliberately rather than pushed off-screen.</tspan></text>
<ellipse cx="632" cy="359" rx="17" ry="17" fill="#dfff58" stroke="#15261f" stroke-width="1" opacity="1"/>
<text x="628" y="361" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="628" dy="0">1</tspan></text>
<text x="665" y="353" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="665" dy="0">One orientation</tspan></text>
<text x="665" y="374" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="665" dy="0">Root stays above descendants at every size.</tspan></text>
<ellipse cx="632" cy="431" rx="17" ry="17" fill="#fffdf8" stroke="#15261f" stroke-width="1" opacity="1"/>
<text x="628" y="433" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="628" dy="0">2</tspan></text>
<text x="665" y="425" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="665" dy="0">No required sideways pan</tspan></text>
<text x="665" y="446" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="665" dy="0">Fit width is the stable default viewport.</tspan></text>
<ellipse cx="632" cy="503" rx="17" ry="17" fill="#fffdf8" stroke="#15261f" stroke-width="1" opacity="1"/>
<text x="628" y="505" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="628" dy="0">3</tspan></text>
<text x="665" y="497" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="665" dy="0">Hidden depth is explicit</tspan></text>
<text x="665" y="518" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="665" dy="0">Edge badges show where more tree exists.</tspan></text>
<rect x="75" y="919" width="1270" height="76" rx="6" fill="#15261f" stroke="#15261f" stroke-width="1" opacity="1" />
<ellipse cx="113" cy="957" rx="20" ry="20" fill="#dfff58" stroke="#dfff58" stroke-width="1" opacity="1"/>
<text x="108" y="958" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="108" dy="0">1</tspan></text>
<text x="151" y="944" fill="#dfff58" font-size="11" font-weight="500" opacity="1"><tspan x="151" dy="0">VERTICAL DEPTH IS THE MOBILE DEFAULT</tspan></text>
<text x="151" y="969" fill="#fffdf8" font-size="11" font-weight="500" opacity="1"><tspan x="151" dy="0">The hierarchy is unchanged; only its orientation responds to the screen.</tspan></text>
</g>
</svg>