<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="1040" viewBox="0 0 1360 1040">
<rect width="1360" height="1040" fill="#f7f3ea"/>
<style>text{font-family:Arial,Helvetica,sans-serif}</style>
<g transform="translate(-30 -2115)">
<text x="50" y="2160" fill="#15261f" font-size="25" font-weight="600" opacity="1"><tspan x="50" dy="0">05 · ACT INSIDE THE TREE</tspan></text>
<text x="50" y="2186" fill="#66736d" font-size="13" font-weight="500" opacity="1"><tspan x="50" dy="0">Selecting and branching preserve the vertical hierarchy. Details rise from the bottom only after the tree establishes context.</tspan></text>
<rect x="50" y="2213" width="1320" height="900" rx="6" fill="#fffdf8" stroke="#15261f" stroke-width="3" opacity="1" />
<rect x="105" y="2251" width="430" height="820" rx="6" fill="#fffdf8" stroke="#15261f" stroke-width="3" opacity="1" />
<rect x="105" y="2251" width="430" height="50" rx="6" fill="#ece8df" stroke="#15261f" stroke-width="1" opacity="1" />
<text x="125" y="2280" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="125" dy="0">CURIOSITYPEDIA</tspan></text>
<text x="483" y="2277" fill="#15261f" font-size="10" font-weight="500" opacity="1"><tspan x="483" dy="0">•••</tspan></text>
<rect x="105" y="2301" width="430" height="76" rx="6" fill="#edf2ee" stroke="#bfc8c2" stroke-width="1" opacity="1" />
<text x="123" y="2332" fill="#15261f" font-size="16" font-weight="500" opacity="1"><tspan x="123" dy="0">Journey tree</tspan></text>
<text x="123" y="2354" fill="#66736d" font-size="9" font-weight="500" opacity="1"><tspan x="123" dy="0">Turn 8 selected · 2 open directions</tspan></text>
<rect x="105" y="2377" width="430" height="44" rx="6" fill="#fffdf8" stroke="#bfc8c2" stroke-width="1" opacity="1" />
<text x="122" y="2400" fill="#66736d" font-size="9" font-weight="500" opacity="1"><tspan x="122" dy="0">‹ LIBRARY</tspan></text>
<rect x="245" y="2385" width="90" height="27" rx="6" fill="#dfff58" stroke="#15261f" stroke-width="1" opacity="1" />
<text x="254" y="2401" fill="#15261f" font-size="9" font-weight="500" opacity="1"><tspan x="254" dy="0">YOU ARE HERE</tspan></text>
<text x="448" y="2400" fill="#66736d" font-size="9" font-weight="500" opacity="1"><tspan x="448" dy="0">SEARCH</tspan></text>
<rect x="247" y="2435" width="146" height="32" rx="6" fill="#15261f" stroke="#15261f" stroke-width="1" opacity="1" />
<text x="259" y="2453" fill="#fffdf8" font-size="9" font-weight="500" opacity="1"><tspan x="259" dy="0">↑ 3 ANCESTORS ABOVE</tspan></text>
<polyline points="320,2467 320,2509" fill="none" stroke="#15261f" stroke-width="4" opacity="1" />
<rect x="230" y="2509" width="180" height="72" rx="6" fill="#a9d4ff" stroke="#15261f" stroke-width="3" opacity="1" />
<ellipse cx="253" cy="2532" rx="13" ry="13" fill="#dfff58" stroke="#15261f" stroke-width="1" opacity="1"/>
<text x="250" y="2535" fill="#15261f" font-size="9" font-weight="500" opacity="1"><tspan x="250" dy="0">8</tspan></text>
<text x="275" y="2528" fill="#66736d" font-size="8" font-weight="500" opacity="1"><tspan x="275" dy="0">TURN</tspan></text>
<text x="240" y="2561" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="240" dy="0">When monuments disagree</tspan></text>
<polyline points="320,2581 320,2605 210,2605 210,2639" fill="none" stroke="#15261f" stroke-width="4" opacity="1" />
<polyline points="320,2605 430,2605 430,2639" fill="none" stroke="#526800" stroke-width="2" opacity="1" stroke-dasharray="8 6"/>
<rect x="130" y="2639" width="158" height="72" rx="6" fill="#edffc1" stroke="#526800" stroke-width="1" opacity="1" stroke-dasharray="8 6"/>
<ellipse cx="153" cy="2662" rx="13" ry="13" fill="#edf2ee" stroke="#526800" stroke-width="1" opacity="1"/>
<text x="150" y="2665" fill="#15261f" font-size="9" font-weight="500" opacity="1"><tspan x="150" dy="0">9</tspan></text>
<text x="175" y="2658" fill="#526800" font-size="8" font-weight="500" opacity="1"><tspan x="175" dy="0">OPEN PATH</tspan></text>
<text x="140" y="2691" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="140" dy="0">Who renames a place?</tspan></text>
<rect x="350" y="2639" width="160" height="72" rx="6" fill="#edffc1" stroke="#526800" stroke-width="1" opacity="1" stroke-dasharray="8 6"/>
<ellipse cx="373" cy="2662" rx="13" ry="13" fill="#edf2ee" stroke="#526800" stroke-width="1" opacity="1"/>
<text x="370" y="2665" fill="#15261f" font-size="9" font-weight="500" opacity="1"><tspan x="370" dy="0">10</tspan></text>
<text x="395" y="2658" fill="#526800" font-size="8" font-weight="500" opacity="1"><tspan x="395" dy="0">OPEN PATH</tspan></text>
<text x="360" y="2691" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="360" dy="0">Can removal repair?</tspan></text>
<polyline points="210,2711 210,2746 320,2746 320,2784" fill="none" stroke="#526800" stroke-width="2" opacity="1" stroke-dasharray="8 6"/>
<rect x="233" y="2784" width="176" height="68" rx="6" fill="#edffc1" stroke="#526800" stroke-width="2" opacity="1" stroke-dasharray="8 6"/>
<text x="247" y="2805" fill="#526800" font-size="8" font-weight="500" opacity="1"><tspan x="247" dy="0">NEW TURN PREVIEW</tspan></text>
<text x="247" y="2832" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="247" dy="0">Research appears here</tspan></text>
<rect x="105" y="2876" width="430" height="195" rx="6" fill="#fffdf8" stroke="#15261f" stroke-width="2" opacity="1" />
<rect x="270" y="2888" width="100" height="5" rx="6" fill="#bfc8c2" stroke="#bfc8c2" stroke-width="1" opacity="1" />
<text x="125" y="2921" fill="#d64b38" font-size="10" font-weight="500" opacity="1"><tspan x="125" dy="0">START A BRANCH FROM TURN 8?</tspan></text>
<text x="125" y="2957" fill="#15261f" font-size="15" font-weight="500" opacity="1"><tspan x="125" dy="0">The current route stays intact.</tspan></text>
<text x="125" y="2982" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="125" dy="0">One live research turn will create the ghost node above.</tspan></text>
<rect x="125" y="3011" width="245" height="42" rx="6" fill="#15261f" stroke="#15261f" stroke-width="1" opacity="1" />
<text x="183" y="3036" fill="#fffdf8" font-size="10" font-weight="500" opacity="1"><tspan x="183" dy="0">START RESEARCH</tspan></text>
<text x="415" y="3037" fill="#15261f" font-size="10" font-weight="500" opacity="1"><tspan x="415" dy="0">Cancel</tspan></text>
<rect x="585" y="2305" width="600" height="420" rx="6" fill="#edf2ee" stroke="#bfc8c2" stroke-width="2" opacity="1" />
<text x="613" y="2353" fill="#15261f" font-size="20" font-weight="600" opacity="1"><tspan x="613" dy="0">The action remains spatial</tspan></text>
<text x="613" y="2388" fill="#66736d" font-size="13" font-weight="500" opacity="1"><tspan x="613" dy="0">The new turn is previewed as a child before confirmation. The sheet explains consequences without covering the parent and siblings.</tspan></text>
<ellipse cx="632" cy="2459" rx="17" ry="17" fill="#dfff58" stroke="#15261f" stroke-width="1" opacity="1"/>
<text x="628" y="2461" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="628" dy="0">1</tspan></text>
<text x="665" y="2453" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="665" dy="0">Context first</tspan></text>
<text x="665" y="2474" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="665" dy="0">Parent and two directions stay visible.</tspan></text>
<ellipse cx="632" cy="2531" rx="17" ry="17" fill="#fffdf8" stroke="#15261f" stroke-width="1" opacity="1"/>
<text x="628" y="2533" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="628" dy="0">2</tspan></text>
<text x="665" y="2525" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="665" dy="0">Ghost node</tspan></text>
<text x="665" y="2546" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="665" dy="0">The result's future location is concrete.</tspan></text>
<ellipse cx="632" cy="2603" rx="17" ry="17" fill="#fffdf8" stroke="#15261f" stroke-width="1" opacity="1"/>
<text x="628" y="2605" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="628" dy="0">3</tspan></text>
<text x="665" y="2597" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="665" dy="0">Partial sheet</tspan></text>
<text x="665" y="2618" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="665" dy="0">Action details do not replace the graph.</tspan></text>
<rect x="75" y="3025" width="1270" height="76" rx="6" fill="#15261f" stroke="#15261f" stroke-width="1" opacity="1" />
<ellipse cx="113" cy="3063" rx="20" ry="20" fill="#dfff58" stroke="#dfff58" stroke-width="1" opacity="1"/>
<text x="108" y="3064" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="108" dy="0">5</tspan></text>
<text x="151" y="3050" fill="#dfff58" font-size="11" font-weight="500" opacity="1"><tspan x="151" dy="0">BRANCHING SHOULD FEEL LIKE GROWING THE TREE</tspan></text>
<text x="151" y="3075" fill="#fffdf8" font-size="11" font-weight="500" opacity="1"><tspan x="151" dy="0">The interface previews the structural change before it spends or commits anything.</tspan></text>
</g>
</svg>