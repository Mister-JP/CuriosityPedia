<text x="1983" y="253" fill="#15261f" font-size="20" font-weight="600" opacity="1"><tspan x="1983" dy="0">How a 58-turn tree fits</tspan></text>
<text x="1983" y="288" fill="#66736d" font-size="13" font-weight="500" opacity="1"><tspan x="1983" dy="0">Every hidden subtree has a visible anchor, name, and count. Expanding a pile replaces only that local region.</tspan></text>
<ellipse cx="2002" cy="359" rx="17" ry="17" fill="#dfff58" stroke="#15261f" stroke-width="1" opacity="1"/>
<text x="1998" y="361" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="1998" dy="0">1</tspan></text>
<text x="2035" y="353" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="2035" dy="0">Active route stays detailed</tspan></text>
<text x="2035" y="374" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="2035" dy="0">The path being followed never collapses.</tspan></text>
<ellipse cx="2002" cy="431" rx="17" ry="17" fill="#fffdf8" stroke="#15261f" stroke-width="1" opacity="1"/>
<text x="1998" y="433" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="1998" dy="0">2</tspan></text>
<text x="2035" y="425" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="2035" dy="0">Side branches become piles</tspan></text>
<text x="2035" y="446" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="2035" dy="0">They remain graph nodes—not a detached list.</tspan></text>
<ellipse cx="2002" cy="503" rx="17" ry="17" fill="#fffdf8" stroke="#15261f" stroke-width="1" opacity="1"/>
<text x="1998" y="505" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="1998" dy="0">3</tspan></text>
<text x="2035" y="497" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="2035" dy="0">Expansion is local</tspan></text>
<text x="2035" y="518" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="2035" dy="0">Other depth bands keep their positions.</tspan></text>
<rect x="1445" y="919" width="1270" height="76" rx="6" fill="#15261f" stroke="#15261f" stroke-width="1" opacity="1" />
<ellipse cx="1483" cy="957" rx="20" ry="20" fill="#dfff58" stroke="#dfff58" stroke-width="1" opacity="1"/>
<text x="1478" y="958" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="1478" dy="0">2</tspan></text>
<text x="1521" y="944" fill="#dfff58" font-size="11" font-weight="500" opacity="1"><tspan x="1521" dy="0">COMPRESSION PRESERVES PARENTHOOD</tspan></text>
<text x="1521" y="969" fill="#fffdf8" font-size="11" font-weight="500" opacity="1"><tspan x="1521" dy="0">A pile always sits on the same edge as the subtree it represents.</tspan></text>
