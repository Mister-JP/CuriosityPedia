<text x="613" y="1303" fill="#15261f" font-size="20" font-weight="600" opacity="1"><tspan x="613" dy="0">Focus is a mode change</tspan></text>
<text x="613" y="1338" fill="#66736d" font-size="13" font-weight="500" opacity="1"><tspan x="613" dy="0">The user chooses Focus branch. Only then does the selected subtree become the centered root of a bounded mobile view.</tspan></text>
<ellipse cx="632" cy="1409" rx="17" ry="17" fill="#dfff58" stroke="#15261f" stroke-width="1" opacity="1"/>
<text x="628" y="1411" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="628" dy="0">1</tspan></text>
<text x="665" y="1403" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="665" dy="0">Breadcrumb preserves ancestry</tspan></text>
<text x="665" y="1424" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="665" dy="0">The original location never becomes mysterious.</tspan></text>
