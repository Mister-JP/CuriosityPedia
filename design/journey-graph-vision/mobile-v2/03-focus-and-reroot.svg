<text x="628" y="1555" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="628" dy="0">3</tspan></text>
<text x="665" y="1547" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="665" dy="0">Return is persistent</tspan></text>
<text x="665" y="1568" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="665" dy="0">Full tree is always one tap away.</tspan></text>
