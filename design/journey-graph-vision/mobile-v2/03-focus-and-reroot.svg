<text x="628" y="1483" fill="#15261f" font-size="11" font-weight="500" opacity="1"><tspan x="628" dy="0">2</tspan></text>
<text x="665" y="1475" fill="#15261f" font-size="12" font-weight="500" opacity="1"><tspan x="665" dy="0">Parent remains visible</tspan></text>
<text x="665" y="1496" fill="#66736d" font-size="10" font-weight="500" opacity="1"><tspan x="665" dy="0">The branch still feels connected to the full tree.</tspan></text>
